<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>霓虹闪避 - Neon Dodge</title>
    <style>
        /* 页面重置与暗黑霓虹风格 */
        body {
            margin: 0;
            padding: 0;
            background-color: #0d0d12;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none; /* 防止手机端滑动页面 */
        }

        /* 游戏画布样式 */
        #gameCanvas {
            background-color: #1a1a24;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.15);
            border-radius: 8px;
            border: 2px solid #2a2a35;
        }

        /* UI 层统一样式 */
        #ui-layer {
            position: absolute;
            width: 400px;
            height: 600px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* 分数板 */
        #scoreBoard {
            padding: 20px;
            font-size: 28px;
            font-weight: 900;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
            letter-spacing: 2px;
        }

        /* 游戏结束画面 */
        #gameOverScreen {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(13, 13, 18, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 8px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
        }

        h1 {
            color: #ff0055;
            text-shadow: 0 0 15px #ff0055;
            font-size: 42px;
            margin: 0 0 10px 0;
        }

        .final-score {
            font-size: 24px;
            margin-bottom: 30px;
            color: #aaa;
        }

        /* 重玩按钮 */
        button {
            background: transparent;
            color: #00ffff;
            border: 2px solid #00ffff;
            padding: 12px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3) inset, 0 0 10px rgba(0, 255, 255, 0.3);
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        button:hover {
            background: #00ffff;
            color: #0d0d12;
            box-shadow: 0 0 20px #00ffff inset, 0 0 20px #00ffff;
            transform: scale(1.05);
        }

        /* 操作提示 */
        .controls-hint {
            position: absolute;
            bottom: -40px;
            width: 100%;
            text-align: center;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="400" height="600"></canvas>
